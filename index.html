<!doctype html>
<html lang="en-AU">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#151311" />

    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="style.css" />

    <title>Bakers Mate</title>
  </head>

  <body>
    <main class="app">
      <!-- HEADER -->
      <header class="app-header">
        <h1>Bakers Mate</h1>
      </header>

      <!-- TOP NAV -->
      <nav class="top-nav">
        <button id="calculatorTab" class="nav-button active" type="button">
          Calculator
        </button>

        <button id="presetsTab" class="nav-button" type="button">
          Presets
        </button>
      </nav>

      <!-- CALCULATOR VIEW -->
      <section id="calculatorView">
        <section class="card calculator-card">
          <!-- TOGGLES -->
          <div class="toggle-row">
            <div class="toggle-group">
              <label class="toggle-option">
                <input id="yeastToggle" type="checkbox" checked />
                <span>Yeast</span>
              </label>

              <label class="toggle-option">
                <input id="oilToggle" type="checkbox" />
                <span>Oil</span>
              </label>

              <label class="toggle-option">
                <input id="sugarToggle" type="checkbox" />
                <span>Sugar</span>
              </label>
            </div>
          </div>

          <!-- FLOUR -->
          <div class="calculator-row">
            <label for="flour">Flour</label>

            <div class="input-row">
              <input
                id="flour"
                type="number"
                inputmode="decimal"
                value="1000"
                min="0"
              />
              <span>g</span>
            </div>

            <strong id="flourAmount" class="row-result">1000g</strong>
          </div>

          <!-- HYDRATION -->
          <div class="calculator-row">
            <label for="hydration">Hydration</label>

            <div class="input-row">
              <input
                id="hydration"
                type="number"
                inputmode="decimal"
                value="70"
                min="0"
              />
              <span>%</span>
            </div>

            <strong id="waterAmount" class="row-result">700g</strong>
          </div>

          <!-- SALT -->
          <div class="calculator-row">
            <label for="salt">Salt</label>

            <div class="input-row">
              <input
                id="salt"
                type="number"
                inputmode="decimal"
                value="2"
                min="0"
                step="0.1"
              />
              <span>%</span>
            </div>

            <strong id="saltAmount" class="row-result">20g</strong>
          </div>

          <!-- YEAST -->
          <div id="yeastField" class="calculator-row optional-field">
            <label for="yeast">Yeast</label>

            <div class="input-row">
              <input
                id="yeast"
                type="number"
                inputmode="decimal"
                value="0.3"
                min="0"
                step="0.1"
              />
              <span>%</span>
            </div>

            <strong id="yeastAmount" class="row-result">3g</strong>
          </div>

          <!-- OIL -->
          <div id="oilField" class="calculator-row optional-field hidden">
            <label for="oil">Oil</label>

            <div class="input-row">
              <input
                id="oil"
                type="number"
                inputmode="decimal"
                value="0"
                min="0"
                step="0.1"
              />
              <span>%</span>
            </div>

            <strong id="oilAmount" class="row-result">0g</strong>
          </div>

          <!-- SUGAR -->
          <div id="sugarField" class="calculator-row optional-field hidden">
            <label for="sugar">Sugar</label>

            <div class="input-row">
              <input
                id="sugar"
                type="number"
                inputmode="decimal"
                value="0"
                min="0"
                step="0.1"
              />
              <span>%</span>
            </div>

            <strong id="sugarAmount" class="row-result">0g</strong>
          </div>

          <!-- TOTAL -->
          <div class="total-row calculator-total-row">
            <span>Total dough</span>
            <strong id="totalDough">1723g</strong>
          </div>
        </section>

        <!-- RESET BUTTON -->
        <button id="resetButton" class="reset-button" type="button">
          Reset
        </button>
      </section>

      <!-- PRESETS VIEW - UNCHANGED -->
      <section id="presetsView" class="hidden">
        <section class="card">
          <h2>Presets</h2>

          <div class="preset-list">
            <button class="preset-card" data-preset="pizzaBalls">Pizza</button>
            <button class="preset-card" data-preset="bagels">Bagels</button>
            <button class="preset-card" data-preset="focaccia">Focaccia</button>
            <button class="preset-card" data-preset="naan">Naan</button>
            <button class="preset-card" data-preset="chapati">Chapati</button>
            <button class="preset-card" data-preset="sourdough">Sourdough</button>
          </div>
        </section>
      </section>

      <!-- PRESET DETAIL VIEW - GENERATED BY JS, LEFT UNCHANGED -->
      <section id="presetDetailView" class="hidden"></section>
    </main>

    <script src="presets.js"></script>
    <script src="script.js"></script>

  </body>
</html>

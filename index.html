<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bakers Mate</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <main class="app">

    <!-- HEADER -->
    <header class="app-header">
      <p class="eyebrow">Baker’s percentage calculator</p>
      <h1>Bakers Mate</h1>
    </header>

    <!-- INPUT CARD -->
    <section class="card input-card">

      <!-- FLOUR -->
      <label for="flour">Flour weight</label>
      <div class="input-row">
        <input
          id="flour"
          type="number"
          inputmode="decimal"
          value="1000"
          min="0"
        />
        <span>g</span>
      </div>

      <!-- HYDRATION -->
      <label for="hydration">Hydration</label>
      <div class="input-row">
        <input
          id="hydration"
          type="number"
          inputmode="decimal"
          value="70"
          min="0"
        />
        <span>%</span>
      </div>

      <!-- SALT -->
      <label for="salt">Salt</label>
      <div class="input-row">
        <input
          id="salt"
          type="number"
          inputmode="decimal"
          value="2"
          min="0"
        />
        <span>%</span>
      </div>

      <!-- YEAST -->
      <label for="yeast">Yeast</label>
      <div class="input-row">
        <input
          id="yeast"
          type="number"
          inputmode="decimal"
          value="0.3"
          min="0"
          step="0.1"
        />
        <span>%</span>
      </div>

      <!-- OIL -->
      <label for="oil">Oil</label>
      <div class="input-row">
        <input
          id="oil"
          type="number"
          inputmode="decimal"
          value="0"
          min="0"
        />
        <span>%</span>
      </div>

      <!-- SUGAR -->
      <label for="sugar">Sugar</label>
      <div class="input-row">
        <input
          id="sugar"
          type="number"
          inputmode="decimal"
          value="0"
          min="0"
        />
        <span>%</span>
      </div>

    </section>

    <!-- RESULTS CARD -->
    <section class="card results-card" aria-live="polite">

      <h2>Results</h2>

      <!-- WATER RESULT -->
      <div class="result-row">
        <span>Water</span>
        <strong id="waterAmount">700g</strong>
      </div>

      <!-- SALT RESULT -->
      <div class="result-row">
        <span>Salt</span>
        <strong id="saltAmount">20g</strong>
      </div>

      <!-- YEAST RESULT -->
      <div class="result-row">
        <span>Yeast</span>
        <strong id="yeastAmount">3g</strong>
      </div>

      <!-- OIL RESULT -->
      <div class="result-row">
        <span>Oil</span>
        <strong id="oilAmount">0g</strong>
      </div>

      <!-- SUGAR RESULT -->
      <div class="result-row">
        <span>Sugar</span>
        <strong id="sugarAmount">0g</strong>
      </div>

      <!-- TOTAL DOUGH -->
      <div class="total-row">
        <span>Total dough</span>
        <strong id="totalDough">1723g</strong>
      </div>

    </section>

    <!-- RESET BUTTON -->
    <button id="resetButton" class="reset-button">
      Reset
    </button>

  </main>

  <!-- JAVASCRIPT -->
  <script src="script.js"></script>

</body>
</html>
